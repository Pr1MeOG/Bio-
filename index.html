<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pr1Me</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#000}

    /* ═══════════════════════════
       CUSTOM CURSOR
    ═══════════════════════════ */
    *{ cursor: none !important; }
    #cursor-dot {
      position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;
      pointer-events:none;z-index:99999;transform:translate(-50%,-50%);
      transition:transform 0.1s ease,background 0.2s;box-shadow:0 0 8px rgba(255,255,255,0.8);
    }
    #cursor-ring {
      position:fixed;width:32px;height:32px;border:1.5px solid rgba(255,255,255,0.5);
      border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);
      transition:width 0.2s ease,height 0.2s ease,border-color 0.2s,opacity 0.2s;
    }
    #cursor-label {
      position:fixed;pointer-events:none;z-index:99997;font-family:'Share Tech Mono',monospace;
      font-size:9px;font-weight:700;color:rgba(255,255,255,0.45);letter-spacing:1.5px;
      text-transform:uppercase;transform:translate(14px,4px);white-space:nowrap;transition:opacity 0.2s;
    }
    body.cursor-hover #cursor-dot{transform:translate(-50%,-50%) scale(2.5);background:#a78bfa;box-shadow:0 0 14px rgba(167,139,250,0.9)}
    body.cursor-hover #cursor-ring{width:48px;height:48px;border-color:rgba(167,139,250,0.6)}
    body.cursor-hover #cursor-label{opacity:0}
    #cursor-dot.click{transform:translate(-50%,-50%) scale(4);opacity:0;transition:transform 0.25s ease,opacity 0.25s ease}

    /* ═══════════════════════════
       SPLASH
    ═══════════════════════════ */
    #splash{
      position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
      background:#04040a;transition:opacity .7s ease;
    }
    #splash::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px)}
    #splash::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(110,60,255,.13) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
    #splashType{position:relative;z-index:2;font-family:'Share Tech Mono',monospace;font-size:clamp(18px,4.5vw,40px);color:#fff;letter-spacing:.5px;text-align:center;padding:0 24px;line-height:1.4}
    .cur{display:inline-block;width:2px;height:1em;background:#fff;margin-left:2px;vertical-align:text-bottom;animation:blink .75s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    #splash.gone{opacity:0;pointer-events:none}

    /* ═══════════════════════════
       VIDEO BG
    ═══════════════════════════ */
    .yt-wrap{position:fixed;inset:0;z-index:0;background:#000;overflow:hidden}
    .yt-wrap div{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100vw;height:56.25vw;min-height:100vh;min-width:177.78vh;border:none;pointer-events:none}
    .overlay{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.52);pointer-events:none;transition:background .3s}

    /* ═══════════════════════════
       MAIN PAGE
    ═══════════════════════════ */
    .page{position:relative;z-index:10;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;opacity:0;transition:opacity .8s ease;pointer-events:none}
    .page.visible{opacity:1;pointer-events:all}

    /* ═══════════════════════════
       CARD — pinch on hover
    ═══════════════════════════ */
    .card-wrap{width:100%;max-width:760px}
    .card{
      width:100%;
      background:rgba(15,15,22,.45);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.09);border-radius:18px;
      padding:26px 28px 22px;
      box-shadow:0 16px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
      position:relative;overflow:hidden;
      transition:box-shadow 0.35s ease;
    }
    /* pinch squeeze on hover */
    .card:hover{
      transform:scaleX(0.972) scaleY(1.008);
      box-shadow:0 20px 70px rgba(0,0,0,.7), 0 0 0 1px rgba(167,139,250,.2),
                 inset 0 0 40px rgba(167,139,250,.04);
    }
    /* shimmer sweep */
    .card::after{
      content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
      transition:left 0.7s ease;pointer-events:none;z-index:0;
    }
    .card:hover::after{left:160%}
    /* glow layer */
    .card::before{
      content:'';position:absolute;inset:0;border-radius:18px;
      background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(56,189,248,.06),transparent 60%);
      opacity:0;transition:opacity .35s;pointer-events:none;z-index:0;
    }
    .card:hover::before{opacity:1}
    .card>*{position:relative;z-index:1}

    .top-row{display:flex;align-items:flex-start;gap:20px;margin-bottom:20px}

    /* avatar */
    .avatar-wrap{position:relative;flex-shrink:0}
    .av-ring{width:86px;height:86px;border-radius:50%;padding:3px;background:#4a4a5a;transition:background .5s,box-shadow .5s}
    .av-ring.online{background:#23d18b;box-shadow:0 0 18px rgba(35,209,139,.55)}
    .av-ring.idle  {background:#f5a623;box-shadow:0 0 18px rgba(245,166,35,.55)}
    .av-ring.dnd   {background:#f04747;box-shadow:0 0 18px rgba(240,71,71,.55)}
    .av-ring.offline{background:#4a4a5a}
    .av-inner{width:100%;height:100%;border-radius:50%;background:#1a1a2e;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;border:2.5px solid #0f0f16}
    .av-inner img{width:100%;height:100%;object-fit:cover;display:block}
    .pip{position:absolute;bottom:3px;right:3px;width:17px;height:17px;border-radius:50%;border:3px solid #0f0f16;background:#4a4a5a;transition:background .4s;z-index:2}
    .pip.online{background:#23d18b}
    .pip.idle  {background:#f5a623}
    .pip.dnd   {background:#f04747}
    .pip.online::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid #23d18b;opacity:0;animation:ripple 2s ease-out infinite}
    @keyframes ripple{0%{transform:scale(.8);opacity:.7}100%{transform:scale(2.2);opacity:0}}

    .info{flex:1;min-width:0}
    .name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}

    .username{font-size:24px;font-weight:900;letter-spacing:-.3px;line-height:1;background:linear-gradient(90deg,#fff 0%,#a78bfa 40%,#38bdf8 70%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
    @keyframes shimmer{to{background-position:200% center}}
    .ncur{display:inline-block;width:2px;height:.85em;background:#a78bfa;vertical-align:text-bottom;margin-left:2px;animation:blink .75s step-end infinite;-webkit-text-fill-color:initial}

    /* badge box */
    .badge-box{display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:4px 7px;backdrop-filter:blur(8px)}
    .bdg{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:transform .18s;position:relative}
    .bdg:hover{transform:scale(1.35) translateY(-2px)}
    .bdg img{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,.7))}
    .bdg[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#fff;font-family:'Inter',sans-serif;font-size:9px;font-weight:600;padding:3px 7px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:99}

    .bio{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px;line-height:1.4;min-height:20px}
    .bcur{display:inline-block;width:2px;height:.9em;background:rgba(255,255,255,.4);vertical-align:text-bottom;margin-left:2px;animation:blink .75s step-end infinite}

    .sline{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.35);transition:color .3s}
    .sline .sdot{width:7px;height:7px;border-radius:50%;background:#4a4a5a;transition:background .3s}
    .sline.online{color:#23d18b}.sline.online .sdot{background:#23d18b}
    .sline.idle  {color:#f5a623}.sline.idle   .sdot{background:#f5a623}
    .sline.dnd   {color:#f04747}.sline.dnd    .sdot{background:#f04747}

    .arow{margin-top:6px;display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.3)}
    .arow .an{color:rgba(255,255,255,.5);font-weight:600}

    .divider{height:1px;background:rgba(255,255,255,.07);margin:0 0 18px}

    .socials{display:flex;justify-content:center;gap:14px;margin-bottom:18px}
    .soc{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background .18s,transform .18s}
    .soc:hover{background:rgba(255,255,255,.16);transform:translateY(-3px) scale(1.1)}

    /* ── BOT ROW ── */
    .bot{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .views{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:99px;padding:5px 13px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);white-space:nowrap}
    .np{font-size:9px;color:rgba(255,255,255,.35);display:none;align-items:center;gap:5px;overflow:hidden;max-width:160px}
    .np-dot{width:5px;height:5px;border-radius:50%;background:#23d18b;flex-shrink:0;animation:blink 1.2s ease-in-out infinite}
    .np-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Share Tech Mono',monospace}

    /* ══════════════════════════════════════
       AESTHETIC CLOCK
    ══════════════════════════════════════ */
    .clock-wrap{
      display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;
    }
    .clock-time{
      font-family:'Share Tech Mono',monospace;
      font-size:18px;font-weight:700;
      letter-spacing:2px;
      /* same shimmer gradient as username */
      background:linear-gradient(90deg,#fff 0%,#a78bfa 50%,#38bdf8 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1;
      text-shadow:none;
    }
    .clock-date{
      font-family:'Share Tech Mono',monospace;
      font-size:9px;letter-spacing:1.5px;
      color:rgba(255,255,255,.3);text-transform:uppercase;
      line-height:1;
    }
    .clock-tz{
      font-family:'Share Tech Mono',monospace;
      font-size:8px;letter-spacing:1px;
      color:rgba(167,139,250,.5);
      line-height:1;
    }

    /* ═══════════════════════════
       CONTROLS
    ═══════════════════════════ */
    .cbar{width:100%;max-width:760px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
    .sldr{display:flex;align-items:center;gap:7px;background:rgba(15,15,22,.78);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:6px 14px;flex:1;min-width:100px;max-width:160px}
    .sldr svg{flex-shrink:0;opacity:.6}
    .sldr input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:99px;outline:none}
    .sldr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 4px rgba(0,0,0,.6)}
    .sldr input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:none}

    .dots{display:flex;align-items:center;gap:7px;background:rgba(15,15,22,.78);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:5px 10px}
    .dbtn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .18s,color .18s,transform .15s;font-family:inherit}
    .dbtn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.25)}
    .dbtn:hover:not(.active){background:rgba(255,255,255,.13);color:#ccc;transform:scale(1.05)}

    @media(max-width:540px){
      .card{padding:18px 14px 16px;border-radius:14px}
      .top-row{flex-direction:column;align-items:center;text-align:center;gap:12px}
      .name-row{justify-content:center}
      .bio{text-align:center}
      .sline{justify-content:center}
      .arow{justify-content:center}
      .username{font-size:20px}
      .av-ring{width:74px;height:74px}
      .bot{flex-direction:column;align-items:center;gap:8px}
      .clock-wrap{align-items:center}
      .np{max-width:100%}
      .sldr{min-width:80px;max-width:120px;padding:5px 10px}
    }

    .notice{width:100%;max-width:760px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:9px 14px;font-size:10px;color:#f5a623;line-height:1.6;display:none}
    .notice a{color:#f5a623}
    .notice code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px;font-size:9px}
  </style>
</head>

/* ══════════════════════════════════════
   CLOCK — IST (UTC+5:30), ticks every sec
══════════════════════════════════════ */
function updateClock(){
  const now = new Date();
  // IST = UTC + 5:30
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  const ist = new Date(utc + 5.5*3600000);

  const hh = String(ist.getHours()).padStart(2,'0');
  const mm = String(ist.getMinutes()).padStart(2,'0');
  const ss = String(ist.getSeconds()).padStart(2,'0');

  const days  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months= ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const day   = days[ist.getDay()];
  const date  = String(ist.getDate()).padStart(2,'0');
  const month = months[ist.getMonth()];

  document.getElementById('clockTime').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('clockDate').textContent = `${day}, ${date} ${month}`;
}
updateClock();
setInterval(updateClock, 1000);

/* typewriter */
function typeLoop(lines,el,speed,delSpeed,pauseOn,pauseOff,cursorClass){
  let li=0,ci=0,del=false;
  const cursor=document.createElement('span');
  cursor.className=cursorClass||'cur';
  el.appendChild(cursor);
  function tick(){
    const txt=lines[li];
    if(el.firstChild&&el.firstChild!==cursor)el.firstChild.remove();
    el.insertBefore(document.createTextNode(txt.slice(0,ci)),cursor);
    if(!del){
      if(ci<txt.length){ci++;setTimeout(tick,speed);}
      else setTimeout(()=>{del=true;tick();},pauseOn);
    }else{
      if(ci>0){ci--;setTimeout(tick,delSpeed);}
      else{del=false;li=(li+1)%lines.length;setTimeout(tick,pauseOff);}
    }
  }
  setTimeout(tick,500);
}

function startEndWatcher(){
  if(endWatcher)clearInterval(endWatcher);
  endWatcher=setInterval(()=>{
    try{
      const cur=ytPlayer.getCurrentTime();
      const dur=ytPlayer.getDuration();
      if(dur>0&&(dur-cur)<=8){ytPlayer.seekTo(0);ytPlayer.playVideo();}
    }catch(e){}
  },500);
}

/* ══════════════════════════════════════════════
   MAGNET PULL EFFECT
   Mouse moves near card → card gets pulled toward mouse
   Like a magnet attracting the card
══════════════════════════════════════════════ */
const card = document.getElementById('card');
let cardAnim = null;
let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

document.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const cardCX = r.left + r.width / 2;
  const cardCY = r.top + r.height / 2;

  // distance from mouse to card center
  const dx = e.clientX - cardCX;
  const dy = e.clientY - cardCY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  // pull strength — closer = stronger, fades beyond 400px
  const maxDist = 400;
  const maxPull = 18; // max px shift

  if (dist < maxDist) {
    const strength = (1 - dist / maxDist);
    targetX = dx * strength * (maxPull / 100);
    targetY = dy * strength * (maxPull / 100);
  } else {
    targetX = 0;
    targetY = 0;
  }
});

// smooth lerp animation
function animMagnet() {
  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;

  // also slight scale up when pulled
  const pull = Math.sqrt(currentX * currentX + currentY * currentY);
  const sc = 1 + pull * 0.0008;

  card.style.transform = `translate(${currentX}px, ${currentY}px) scale(${sc})`;
  requestAnimationFrame(animMagnet);
}
animMagnet();

/* lanyard */
const STXT={online:'online',idle:'idle',dnd:'do not disturb',offline:'offline'};
const AICO={0:'🎮',1:'🎵',2:'🎵',3:'📺',4:'✏️',5:'🎙️'};
function setStatus(s){
  s=s||'offline';
  ['online','idle','dnd','offline'].forEach(c=>{document.getElementById('ring').classList.remove(c);document.getElementById('pip').classList.remove(c);document.getElementById('sline').classList.remove(c);});
  document.getElementById('ring').classList.add(s);document.getElementById('pip').classList.add(s);document.getElementById('sline').classList.add(s);
  document.getElementById('stxt').textContent=STXT[s]||'offline';
}
function setActivity(acts){
  const a=(acts||[]).find(x=>x.type!==4);
  if(a){document.getElementById('aicon').textContent=AICO[a.type]||'✨';document.getElementById('aname').textContent=a.name||'';document.getElementById('adetail').textContent=a.details?'— '+a.details:(a.state||'');}
  else{document.getElementById('aicon').textContent='👾';document.getElementById('aname').textContent='Not doing anything';document.getElementById('adetail').textContent='';}
}
function setAvatar(uid,hash){
  if(!hash)return;
  const img=new Image();
  img.src=`https://cdn.discordapp.com/avatars/${uid}/${hash.startsWith('a_')?hash+'.gif':hash+'.png'}?size=128`;
  img.onload=()=>{const av=document.getElementById('av');av.innerHTML='';av.appendChild(img);};
}
function connectLanyard(){
  if(DISCORD_ID==='YOUR_DISCORD_ID'){document.getElementById('notice').style.display='block';return;}
  document.getElementById('dlink').href=`https://discord.com/users/${DISCORD_ID}`;
  const ws=new WebSocket('wss://api.lanyard.rest/socket');
  let hb;
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.op===1){hb=setInterval(()=>ws.send(JSON.stringify({op:3})),m.d.heartbeat_interval);ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}}));}
    if(m.op===0){setStatus(m.d.discord_status);setActivity(m.d.activities);if(m.d.discord_user)setAvatar(m.d.discord_user.id,m.d.discord_user.avatar);}
  };
  ws.onclose=()=>{clearInterval(hb);setStatus('offline');setTimeout(connectLanyard,3000);};
  ws.onerror=()=>ws.close();
}
connectLanyard();
